name: Build OnePlus Nord 3 AOSP Kernel (SukiSU Ultra + SuSFS)

on:
  workflow_dispatch:
    inputs:
      FILE:
        type: string
        description: "Configuration file"
        required: true
        default: manifest_crom_n3
      BUILD_TIME:
        type: string
        description: "Custom build time (Enter F to use current time)"
        required: false
        default: "F"
      SUFFIX:
        type: string
        description: "Custom kernel suffix (leave empty for random)"
        required: false
        default: "LuffyOP⚡"
      SUSFS_CI:
        type: choice
        description: "SUSFS module download method"
        required: true
        default: CI
        options: [CI, Release, NoN]
      KSU_META:
        type: string
        description: "Branch name/Custom version identifier"
        required: false
        default: "susfs-main/LuffyOP⚡"
      FAST_BUILD:
        type: boolean
        description: "Enable fast build?"
        required: true
        default: true
      VFS:
        type: boolean
        description: "Enable manual hooks (VFS)?"
        required: true
        default: true
      KPM:
        type: boolean
        description: "Enable Kernel Patch Module (KPM)?"
        required: true
        default: true

jobs:
  build:
    name: >-
      ${{ github.event.inputs.FAST_BUILD == 'true' && '[FAST] ' || '' }}
      ${{ github.event.inputs.FILE }} ${{ github.event.inputs.SUFFIX }}
    runs-on: ubuntu-latest

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_MAXSIZE: 10G
      BUILD_CONFIG: kernel-5.10/build.config.oplus6983

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 10240
          temp-reserve-mb: 4096
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true

      - name: Create & Enable Swap (6GB)
        run: |
          sudo swapoff -a
          sudo fallocate -l 6G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Validate Input & Set Environment Variables
        run: |
          FILE="${{ github.event.inputs.FILE }}"
          declare -A VALID_COMBOS=(
            ["manifest_crom_n3"]="mt6983 android12 5.10"
          )
          COMBO="${VALID_COMBOS[$FILE]:-}"
          if [[ -z "$COMBO" ]]; then
            echo "❌ Unknown FILE: $FILE"
            exit 1
          fi
          read CPU ANDROID_VERSION KERNEL_VERSION <<< "$COMBO"
          echo "CPU=$CPU" >> $GITHUB_ENV
          echo "ANDROID_VERSION=$ANDROID_VERSION" >> $GITHUB_ENV
          echo "KERNEL_VERSION=$KERNEL_VERSION" >> $GITHUB_ENV
          echo "BUILD_METHOD=perf" >> $GITHUB_ENV

      - name: Set Up Ccache Directory
        run: |
          mkdir -p "\( HOME/.ccache_ \){{ github.event.inputs.FILE }}"
          echo "CCACHE_DIR=\( HOME/.ccache_ \){{ github.event.inputs.FILE }}" >> $GITHUB_ENV

      - name: Restore Ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-nord3-\( {{ github.ref_name }}- \){{ github.event.inputs.FILE }}-\( {{ env.BUILD_METHOD }}- \){{ github.event.inputs.FAST_BUILD == 'true' && 'fast' || 'full' }}

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential ccache curl flex git libelf-dev \
            libncurses-dev libssl-dev lld llvm python3 rsync unzip zip \
            zlib1g-dev liblz4-tool

      - name: Install Repo Tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Sync Kernel Source
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/Luffy-456/SukiSU_Kernel_Nord3.git \
            -m ${{ github.event.inputs.FILE }}.xml --depth=1
          repo sync -c -j$(nproc --all) --no-tags --force-sync

      - name: Fix Vendor Path (OnePlus-specific)
        run: |
          cd kernel_workspace
          if [[ -d "kernel_module/vendor" ]]; then
            mv kernel_module/vendor .
            rm -rf kernel_module
          fi

      - name: Apply Custom Kernel Suffix
        if: ${{ github.event.inputs.SUFFIX != '' }}
        run: |
          cd kernel_workspace/kernel-${{ env.KERNEL_VERSION }}
          SUFFIX="${{ github.event.inputs.SUFFIX }}"
          sed -i 's/ -dirty//g' scripts/setlocalversion
          sed -i '/scm_version/a res=$(echo "$res" | sed "s/-dirty//g")' scripts/setlocalversion
          sed -i "s|echo \"\${KERNELVERSION}.*\"|echo \"\\( {KERNELVERSION}- \){{ env.ANDROID_VERSION }}-${SUFFIX}\"|" scripts/setlocalversion
          git add -A && git commit -m "Add custom suffix: $SUFFIX" || true

      - name: Integrate SukiSU Ultra
        run: |
          cd kernel_workspace/kernel-${{ env.KERNEL_VERSION }}
          META="${{ github.event.inputs.KSU_META }}"
          BRANCH="${META%%/*}"
          TAG="${META#*/}"
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$BRANCH"
          cd KernelSU
          KSU_API=$(curl -fsSL "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/$BRANCH/kernel/Makefile" \
            | grep "KSU_VERSION_API :=" | awk '{print $NF}' || echo "3.1.7")
          KSU_FULL="v$KSU_API-$TAG@$BRANCH"
          sed -i '/KSU_VERSION_API :=/d; /KSU_VERSION_FULL :=/d' kernel/Makefile
          echo "KSU_VERSION_API := $KSU_API" >> kernel/Makefile
          echo "KSU_VERSION_FULL := $KSU_FULL" >> kernel/Makefile
          echo "KSUVER=$(expr $(git rev-list --count main 2>/dev/null || echo 13000) + 10700)" >> $GITHUB_ENV

      - name: Apply SuSFS & Additional Patches
        run: |
          cd kernel_workspace/kernel-${{ env.KERNEL_VERSION }}
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-\( {{ env.ANDROID_VERSION }}- \){{ env.KERNEL_VERSION }} ../susfs4ksu
          git clone --depth=1 https://github.com/ShirkNeko/SukiSU_patch.git ../sukisu_patch
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-\( {{ env.ANDROID_VERSION }}- \){{ env.KERNEL_VERSION }}.patch .
          cp -r ../susfs4ksu/kernel_patches/fs/* fs/
          cp -r ../susfs4ksu/kernel_patches/include/linux/* include/linux/
          patch -p1 < 50_add_susfs_in_gki-\( {{ env.ANDROID_VERSION }}- \){{ env.KERNEL_VERSION }}.patch || true
          cp ../sukisu_patch/69_hide_stuff.patch .
          patch -p1 -F3 < 69_hide_stuff.patch || true
          if ${{ github.event.inputs.VFS }}; then
            cp ../sukisu_patch/hooks/syscall_hooks.patch .
            patch -p1 -F3 < syscall_hooks.patch || true
          fi

      - name: Configure Kernel defconfig
        run: |
          cd kernel_workspace/kernel-${{ env.KERNEL_VERSION }}
          CONFIG="arch/arm64/configs/gki_defconfig"
          {
            echo "CONFIG_KSU=y"
            echo "CONFIG_KSU_SUSFS=y"
            echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
            echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
            echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n"
            echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
            echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
            echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y"
            echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
            echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y"
            echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
            echo "CONFIG_TMPFS_XATTR=y"
            echo "CONFIG_TMPFS_POSIX_ACL=y"
            echo "CONFIG_TCP_CONG_ADVANCED=y"
            echo "CONFIG_TCP_CONG_BBR=y"
            echo "CONFIG_NET_SCH_FQ=y"
            echo "CONFIG_TCP_CONG_BIC=n"
            echo "CONFIG_TCP_CONG_WESTWOOD=n"
            echo "CONFIG_TCP_CONG_HTCP=n"
            echo "CONFIG_IP_ECN=y"
            echo "CONFIG_TCP_ECN=y"
            echo "CONFIG_IPV6_ECN=y"
            echo "CONFIG_IP_NF_TARGET_ECN=y"
          } >> "$CONFIG"
          if ${{ github.event.inputs.KPM }}; then echo "CONFIG_KPM=y" >> "$CONFIG"; fi
          if ${{ github.event.inputs.VFS }}; then
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> "$CONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> "$CONFIG"
          else
            echo "CONFIG_KPROBES=y" >> "$CONFIG"
            echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> "$CONFIG"
          fi
          sed -i 's/check_defconfig//' build.config.gki

      - name: Build Kernel (FAST mode)
        if: ${{ github.event.inputs.FAST_BUILD == 'true' }}
        run: |
          cd kernel_workspace/kernel-${{ env.KERNEL_VERSION }}
          export PATH="/usr/lib/ccache:$PATH"
          export CC="ccache clang"
          ./build/build.sh

      - name: Patch Kernel Image for KPM Compatibility
        run: |
          cd kernel_workspace/kernel-${{ env.KERNEL_VERSION }}/out/android12-5.10/kernel-5.10/arch/arm64/boot
          curl -LO https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU_patch/main/kpm/patch_linux
          chmod +x patch_linux
          gzip -d Image.gz
          ./patch_linux
          mv oImage Image
          gzip -9 Image

      - name: Package with AnyKernel3 (Updated fork)
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cp kernel-${{ env.KERNEL_VERSION }}/out/android12-5.10/kernel-5.10/arch/arm64/boot/Image.gz ak3/
          cd ak3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          sed -i 's/DEVICE=".*"/DEVICE="OnePlus Nord 3"/' anykernel.sh
          sed -i 's/BLOCK=/boot;/' anykernel.sh
          zip -r9 "../Nika-Kernel-Nord3-AOSP-\( {{ github.event.inputs.SUFFIX }} \){{ github.event.inputs.VFS && '_VFS' || '' }}\( {{ github.event.inputs.KPM && '_KPM' || '' }}-KSU \){{ env.KSUVER }}.zip" *

      - name: Upload Final Zip
        uses: actions/upload-artifact@v4
        with:
          name: Nika-Kernel-Nord3-AOSP-\( {{ github.event.inputs.SUFFIX }} \){{ github.event.inputs.VFS && '_VFS' || '' }}${{ github.event.inputs.KPM && '_KPM' || '' }}
          path: kernel_workspace/*.zip
          if-no-files-found: error

      - name: Post-build Disk Space Check
        run: df -h
